<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바리 : 핏빛 안개의 저택</title>
<style>
/* ════════════════════════════════════════════════
   폰트 임포트
════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=UnifrakturMaguntia&family=Noto+Sans+KR:wght@300;400;500&family=Share+Tech+Mono&display=swap');

/* ════════════════════════════════════════════════
   CSS 변수 — 고딕 호러 팔레트
════════════════════════════════════════════════ */
:root {
  /* 베이스 */
  --bg-void:        #06060A;
  --bg-deep:        #0D0D14;
  --bg-mid:         #12121C;
  --bg-surface:     #1A1A28;
  --ash:            #2A2A38;

  /* 핏빛 크림슨 (환경) */
  --blood:          #8B0000;
  --blood-bright:   #C0392B;
  --blood-glow:     #E74C3C;
  --blood-dim:      #3D0000;

  /* 골드 앰버 (아이템/바리) */
  --gold:           #B8860B;
  --gold-bright:    #DAA520;
  --gold-glow:      #F0C040;

  /* 퍼플 (광기/환각) */
  --madness-purple: #6C3483;
  --madness-bright: #9B59B6;
  --madness-glow:   #BF6BE8;

  /* 텍스트 */
  --text-bone:      #D4C5A9;
  --text-dim:       #7A6E60;
  --text-faint:     #3D3830;

  /* 씬별 포인트 컬러 (JS로 --scene-accent 변수 교체) */
  --scene-accent:   #8B0000;

  /* 글로우 효과 */
  --glow-blood: 0 0 8px rgba(192,57,43,0.8), 0 0 20px rgba(139,0,0,0.5), 0 0 40px rgba(139,0,0,0.2);
  --glow-gold:  0 0 8px rgba(218,165,32,0.8), 0 0 20px rgba(184,134,11,0.4);
  --glow-mad:   0 0 8px rgba(155,89,182,0.8), 0 0 25px rgba(108,52,131,0.5);
  --glow-warm:  0 0 8px rgba(230,126,34,0.7), 0 0 20px rgba(180,80,10,0.4);
}

/* ════════════════════════════════════════════════
   리셋 & 기본
════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  background: var(--bg-void);
  color: var(--text-bone);
  font-family: 'Noto Serif KR', serif;
  overflow: hidden;
  width: 100%; height: 100vh;
  position: relative;
}

/* ════════════════════════════════════════════════
   배경 레이어
════════════════════════════════════════════════ */
/* 배경 그라디언트 (씬별 색상 변화) */
#bg-gradient {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 30% 70%, var(--scene-accent) 0%, transparent 45%),
              radial-gradient(ellipse at 70% 20%, rgba(13,13,20,0.9) 0%, var(--bg-void) 70%);
  opacity: 0.18;
  transition: background 1.2s ease;
}

/* 노이즈 텍스처 */
#noise-overlay {
  position: fixed; inset: 0; z-index: 1;
  opacity: 0.035;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  animation: noiseShift 0.12s steps(1) infinite;
}
@keyframes noiseShift {
  0%   { opacity: 0.035; transform: translate(0,0); }
  33%  { opacity: 0.05;  transform: translate(-1px,1px); }
  66%  { opacity: 0.028; transform: translate(1px,-1px); }
  100% { opacity: 0.035; transform: translate(0,0); }
}

/* 안개 파티클 */
#particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.fog-particle {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(139,0,0,0.3) 0%, transparent 70%);
  animation: fogDrift linear infinite;
  pointer-events: none;
}
@keyframes fogDrift {
  0%   { transform: translateY(110vh) translateX(0) scale(0.5); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-10vh) translateX(var(--dx)) scale(1.2); opacity: 0; }
}

/* 광기 글리치 오버레이 */
#glitch-overlay {
  position: fixed; inset: 0; z-index: 999;
  pointer-events: none; display: none;
}
#glitch-overlay.active { display: block; }
#glitch-overlay::before,
#glitch-overlay::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(transparent 0%, rgba(139,0,0,0.08) 50%, transparent 100%);
  animation: glitchScan 0.15s steps(2) infinite;
}
#glitch-overlay::after {
  background: rgba(139,0,0,0.04);
  animation: glitchFlash 0.3s ease infinite;
  mix-blend-mode: screen;
}
@keyframes glitchScan {
  0%   { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}
@keyframes glitchFlash {
  0%,100% { opacity: 0; }
  50%     { opacity: 1; }
}

/* 씬 전환 오버레이 */
#transition-veil {
  position: fixed; inset: 0; z-index: 1000;
  background: #000; opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
#transition-veil.active { opacity: 1; pointer-events: all; }

/* ════════════════════════════════════════════════
   앱 레이아웃
════════════════════════════════════════════════ */
#app {
  position: relative; z-index: 10;
  width: 100%; height: 100vh;
  display: flex; flex-direction: column;
}

/* ════════════════════════════════════════════════
   타이틀 화면
════════════════════════════════════════════════ */
#title-screen {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1.4rem; padding: 2rem;
  text-align: center;
  animation: titleReveal 1.8s ease forwards;
}
@keyframes titleReveal {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.title-eyebrow {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.7rem; letter-spacing: 0.5em;
  color: var(--blood-bright); opacity: 0.8;
  text-transform: uppercase;
  animation: pulseOpacity 3s ease-in-out infinite;
}
@keyframes pulseOpacity { 0%,100%{opacity:0.8} 50%{opacity:1} }

.title-kr {
  font-family: 'UnifrakturMaguntia', cursive;
  font-size: clamp(3.5rem, 9vw, 7rem);
  color: var(--text-bone);
  text-shadow: var(--glow-blood);
  line-height: 1;
  animation: titleFlicker 5s ease-in-out infinite;
}
@keyframes titleFlicker {
  0%,100%{opacity:1}
  91%{opacity:1} 92%{opacity:0.3} 93%{opacity:1}
  96%{opacity:0.7} 97%{opacity:1}
}

.title-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.85rem; letter-spacing: 0.35em;
  color: var(--blood-bright);
  text-transform: uppercase;
}

.title-divider {
  width: 200px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(139,0,0,0.6), transparent);
}

.title-origin {
  font-size: 0.78rem; color: var(--text-dim);
  line-height: 2; letter-spacing: 0.08em;
}

.title-tagline {
  font-size: 0.88rem; color: var(--text-bone);
  line-height: 2; max-width: 420px;
}
.title-tagline em { color: var(--blood-bright); font-style: normal; }

/* 시작 버튼 */
.btn-enter {
  margin-top: 0.5rem;
  padding: 0.9rem 2.8rem;
  background: transparent;
  border: 1px solid var(--blood);
  color: var(--text-bone);
  font-family: 'Noto Serif KR', serif;
  font-size: 0.9rem; letter-spacing: 0.35em;
  cursor: pointer; position: relative; overflow: hidden;
  transition: all 0.3s;
}
.btn-enter::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--blood-dim), rgba(139,0,0,0.2));
  transform: translateX(-100%);
  transition: transform 0.4s ease;
}
.btn-enter:hover::before { transform: translateX(0); }
.btn-enter:hover {
  border-color: var(--blood-bright);
  box-shadow: var(--glow-blood);
  color: #fff;
}
.btn-enter span { position: relative; z-index: 1; }

/* ════════════════════════════════════════════════
   HUD — 상단 변수 바
════════════════════════════════════════════════ */
#hud {
  flex-shrink: 0;
  display: none; /* 게임 시작 후 표시 */
  align-items: center;
  gap: 1rem;
  padding: 0.6rem 1.5rem;
  background: rgba(6,6,10,0.92);
  border-bottom: 1px solid rgba(139,0,0,0.25);
  backdrop-filter: blur(12px);
  position: relative;
  z-index: 50;
}

/* 게임 타이틀 (HUD 내) */
.hud-logo {
  font-family: 'UnifrakturMaguntia', cursive;
  font-size: 1.4rem;
  color: var(--text-bone);
  text-shadow: var(--glow-blood);
  flex-shrink: 0;
  white-space: nowrap;
  animation: titleFlicker 5s ease-in-out infinite;
}

/* 게이지 그룹 */
.hud-gauges {
  display: flex; gap: 1.2rem; flex: 1;
  justify-content: center; flex-wrap: wrap;
  align-items: center;
}

.gauge-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  min-width: 80px;
}

.gauge-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.25em;
  color: var(--text-dim); text-transform: uppercase;
}

/* 게이지 바 트랙 */
.gauge-track {
  width: 90px; height: 7px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px; overflow: visible;
  position: relative;
}

/* 게이지 채움 바 (네온 글로우) */
.gauge-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.25,0.46,0.45,0.94),
              box-shadow 0.6s ease;
  position: relative;
}

/* 의지 — 핏빛 레드 */
.will-fill {
  background: linear-gradient(90deg, var(--blood-dim), var(--blood-bright));
}
.will-fill.lit {
  box-shadow: 0 0 6px var(--blood-bright), 0 0 14px rgba(192,57,43,0.7);
}

/* 온기 — 앰버 오렌지 */
.warmth-fill {
  background: linear-gradient(90deg, #7D3C00, #E67E22);
}
.warmth-fill.lit {
  box-shadow: 0 0 6px #E67E22, 0 0 14px rgba(230,126,34,0.6);
}

/* 광기 — 퍼플 */
.madness-fill {
  background: linear-gradient(90deg, #3D1A50, var(--madness-bright));
}
.madness-fill.lit {
  box-shadow: 0 0 6px var(--madness-bright), 0 0 16px rgba(155,89,182,0.7);
}

.gauge-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem; color: var(--text-bone);
}

/* 불리언 배지 */
.hud-bools {
  display: flex; gap: 0.7rem; align-items: center; flex-shrink: 0;
}
.bool-badge {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.bool-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.5rem; letter-spacing: 0.2em; color: var(--text-dim);
}
.bool-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; padding: 2px 8px; border-radius: 2px;
  transition: all 0.4s;
}
.bool-false { background: rgba(30,30,40,0.6); color: var(--text-faint); border: 1px solid rgba(80,80,100,0.2); }
.bool-true  { background: rgba(139,0,0,0.3);  color: #FF7979;          border: 1px solid rgba(192,57,43,0.5);
              box-shadow: 0 0 8px rgba(192,57,43,0.5); }

/* RED UI 경고 배너 */
#red-alert {
  display: none;
  padding: 3px 12px;
  background: rgba(139,0,0,0.25);
  border: 1px solid var(--blood-bright);
  color: var(--blood-bright);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.15em;
  flex-shrink: 0;
  animation: redAlertPulse 0.9s ease-in-out infinite;
}
@keyframes redAlertPulse {
  0%,100% { opacity:1; box-shadow: 0 0 8px rgba(139,0,0,0.4); }
  50%     { opacity:0.5; box-shadow: 0 0 20px rgba(192,57,43,0.8); }
}

/* ════════════════════════════════════════════════
   게임 바디 (좌: 비주얼 / 우: 콘텐츠)
════════════════════════════════════════════════ */
#game-body {
  flex: 1; display: none;
  overflow: hidden;
}

/* ── 좌측 비주얼 패널 ── */
#visual-panel {
  width: 36%; flex-shrink: 0;
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(139,0,0,0.18);
  position: relative; overflow: hidden;
}

#scene-art {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  background: rgba(6,6,10,0.5);
  padding: 1.5rem;
  position: relative;
}

.scene-svg {
  width: 100%; max-height: 100%;
  filter: drop-shadow(0 0 18px rgba(139,0,0,0.35));
  transition: opacity 0.4s;
}

/* 씬 레이블 (비주얼 하단) */
#visual-label {
  flex-shrink: 0;
  padding: 0.6rem 1rem;
  background: rgba(6,6,10,0.8);
  border-top: 1px solid rgba(139,0,0,0.15);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.2em;
  color: var(--text-dim); text-align: center;
  text-transform: uppercase;
}

/* ── 우측 콘텐츠 패널 ── */
#content-panel {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden;
}

/* 씬 헤더 */
#scene-header {
  flex-shrink: 0;
  padding: 1rem 1.8rem 0.8rem;
  border-bottom: 1px solid rgba(139,0,0,0.12);
  background: rgba(6,6,10,0.6);
}

#scene-phase-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.4em;
  color: var(--scene-accent);
  text-transform: uppercase;
  margin-bottom: 0.3rem;
  transition: color 0.8s;
}

#scene-title-text {
  font-size: 1.25rem;
  color: var(--text-bone);
  line-height: 1.4;
  font-weight: 600;
}

/* 스크립트 스크롤 영역 */
#script-scroll {
  flex: 1; overflow-y: auto;
  padding: 1.4rem 1.8rem;
  scrollbar-width: thin;
  scrollbar-color: rgba(139,0,0,0.35) transparent;
}
#script-scroll::-webkit-scrollbar { width: 3px; }
#script-scroll::-webkit-scrollbar-thumb { background: rgba(139,0,0,0.35); }

/* 배경 묘사 */
.bg-description {
  font-size: 0.8rem; line-height: 2.1;
  color: var(--text-dim); font-style: italic;
  padding-left: 0.9rem;
  border-left: 2px solid rgba(139,0,0,0.25);
  margin-bottom: 1.3rem;
}

/* 대사 블록 */
.dialogue {
  margin-bottom: 1.1rem;
}
.dialogue-who {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.22em;
  color: var(--gold); margin-bottom: 0.3rem;
  text-transform: uppercase;
}
.dialogue-line {
  font-size: 0.88rem; line-height: 2;
  color: var(--text-bone);
  background: rgba(139,0,0,0.05);
  border-left: 3px solid rgba(139,0,0,0.3);
  padding: 0.5rem 0.9rem;
  position: relative;
}
.dialogue-line::before {
  content: '"';
  font-size: 1.8rem; line-height: 0;
  color: rgba(139,0,0,0.25);
  position: absolute; top: 0.4rem; left: 0.1rem;
}

/* 타이핑 커서 */
.typing-cursor {
  display: inline-block; width: 2px; height: 0.9em;
  background: var(--text-bone); vertical-align: text-bottom;
  animation: cursorBlink 0.7s step-end infinite;
  margin-left: 1px;
}
@keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

/* 광기 환각 메시지 */
.hallucination-msg {
  font-size: 0.75rem; line-height: 1.9;
  color: var(--madness-bright); font-style: italic;
  border: 1px solid rgba(155,89,182,0.25);
  background: rgba(108,52,131,0.06);
  padding: 0.5rem 0.9rem;
  margin: 0.8rem 0;
  animation: halluPulse 2.5s ease-in-out infinite;
}
@keyframes halluPulse { 0%,100%{opacity:0.8} 50%{opacity:0.35} }

/* 수치 힌트 박스 */
.stat-hint {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem; color: var(--text-dim);
  border: 1px solid rgba(139,0,0,0.15);
  background: rgba(6,6,10,0.6);
  padding: 0.5rem 0.9rem;
  margin: 0.9rem 0;
  line-height: 1.8;
}
.stat-hint .accent { color: var(--blood-bright); }

/* ════════════════════════════════════════════════
   선택지 패널
════════════════════════════════════════════════ */
#choices-panel {
  flex-shrink: 0;
  padding: 0.9rem 1.8rem 1.4rem;
  background: rgba(6,6,10,0.85);
  border-top: 1px solid rgba(139,0,0,0.2);
}

.choices-header {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.4em;
  color: var(--text-faint); margin-bottom: 0.7rem;
  text-transform: uppercase;
}

#choices-list { display: flex; flex-direction: column; gap: 0.55rem; }

/* 선택지 버튼 */
.choice-btn {
  background: transparent;
  border: 1px solid rgba(139,0,0,0.28);
  color: var(--text-bone);
  font-family: 'Noto Serif KR', serif;
  font-size: 0.84rem; line-height: 1.6;
  padding: 0.75rem 1.1rem;
  text-align: left; cursor: pointer;
  position: relative; overflow: hidden;
  transition: border-color 0.2s, color 0.2s;
  display: flex; align-items: flex-start; gap: 0.8rem;
}

/* 호버 슬라이드 배경 */
.choice-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(139,0,0,0.22), transparent 70%);
  transform: translateX(-102%);
  transition: transform 0.3s ease;
}

/* 버튼 테두리 네온 레드 글로우 (호버) */
.choice-btn:hover::before { transform: translateX(0); }
.choice-btn:hover {
  border-color: var(--blood-bright);
  color: #fff;
  box-shadow: inset 0 0 15px rgba(139,0,0,0.12),
              0 0 10px rgba(139,0,0,0.2);
}

/* 경련(Convulsion) 호버 애니메이션 */
.choice-btn:hover { animation: convulse 0.15s ease infinite alternate; }
@keyframes convulse {
  from { transform: translateX(0); }
  to   { transform: translateX(1px) skewX(0.3deg); }
}

/* 번호 뱃지 */
.choice-num {
  flex-shrink: 0;
  width: 1.3rem; height: 1.3rem;
  border: 1px solid rgba(139,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem; color: var(--blood-bright);
  margin-top: 0.15rem;
  position: relative; z-index: 1;
}

.choice-text { position: relative; z-index: 1; }

.choice-effect {
  display: block; margin-top: 0.2rem;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.62rem; color: var(--blood-bright);
  opacity: 0.75;
}

/* 잠긴 선택지 */
.choice-btn.locked {
  opacity: 0.28; cursor: not-allowed;
  border-color: rgba(60,60,70,0.3);
  animation: none !important;
}
.choice-btn.locked:hover::before { transform: translateX(-102%); }
.choice-btn.locked:hover { border-color: rgba(60,60,70,0.3); color: var(--text-bone); box-shadow: none; }
.choice-btn.locked .choice-num { border-color: #333; color: #444; }
.choice-effect.locked-msg { color: #555; }

/* ════════════════════════════════════════════════
   엔딩 화면
════════════════════════════════════════════════ */
#ending-screen {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; gap: 1.3rem;
  padding: 2rem 1.5rem;
  flex: 1; overflow-y: auto;
}

.ending-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem; letter-spacing: 0.5em;
  border: 1px solid rgba(139,0,0,0.35);
  color: var(--blood-bright);
  padding: 0.3rem 1.2rem; text-transform: uppercase;
}

.btn-restart {
  padding: 0.75rem 2.2rem;

════════════════════════════════════════════════ */

  flex: 1; padding: 2rem;

.gameover-title {
  font-family: 'UnifrakturMaguntia', cursive;
  font-size: clamp(2.5rem, 6vw, 4.5rem);

  text-shadow: var(--glow-blood);

  font-size: 0.88rem; color: var(--text-dim);

════════════════════════════════════════════════ */

  to   { opacity: 1; transform: translateX(0); }
}

/* ══════════════════════════════════════════════════════════
   HUD 업데이트
   ══════════════════════════════════════════════════════════ */
function HUD업데이트() {
  const MAX = 100;
  // 게이지 바 채우기
  const wFill = document.getElementById('will-fill');
  const waFill = document.getElementById('warmth-fill');
  const mFill  = document.getElementById('madness-fill');

  const wPct  = Math.min(의지, MAX);
  const waPct = Math.min(온기, MAX);
  const mPct  = Math.min(광기, MAX);

  wFill.style.width  = wPct  + '%';
  waFill.style.width = waPct + '%';
  mFill.style.width  = mPct  + '%';

  // 글로우 효과 (수치 > 0일 때 lit 클래스)
  wFill.classList.toggle('lit',  의지 > 0);
  waFill.classList.toggle('lit', 온기 > 0);
  mFill.classList.toggle('lit',  광기 > 0);

  // 숫자 표시
  document.getElementById('will-num').textContent    = 의지;
  document.getElementById('warmth-num').textContent  = 온기;
  document.getElementById('madness-num').textContent = 광기;

  // 불리언 배지
  const solBadge = document.getElementById('solidarity-badge');
  solBadge.textContent = 연대 ? 'TRUE' : 'FALSE';
  solBadge.className   = '연대 ? bool-val bool-true : bool-val bool-false'.replace('연대 ?', '');
  solBadge.className   = `bool-val ${연대 ? 'bool-true' : 'bool-false'}`;

  const keyBadge = document.getElementById('key-badge');
  keyBadge.textContent = KEY ? 'TRUE' : 'FALSE';
  keyBadge.className   = `bool-val ${KEY ? 'bool-true' : 'bool-false'}`;

  // RED UI 경고 (광기 ≥ 20)
  const alert = document.getElementById('red-alert');
  if (광기 >= 20) {
    alert.style.display = 'block';
    alert.textContent   = 광기 >= 30 ? '⚠ 위험 — 광기 ≥30 (연구원 경계)' : '⚠ 광기 ≥20 (환각 발생)';
  } else {
    alert.style.display = 'none';
  }

  // 글리치 오버레이 (광기 ≥ 20)
  document.getElementById('glitch-overlay').classList.toggle('active', 광기 >= 20);
}

/* ══════════════════════════════════════════════════════════
   씬별 포인트 컬러 적용
   ══════════════════════════════════════════════════════════ */
function 씬_포인트_적용(씬ID) {
  const color = 씬_포인트컬러[씬ID] || '#8B0000';
  document.documentElement.style.setProperty('--scene-accent', color);
  document.getElementById('scene-phase-tag').style.color = color;
}

/* ══════════════════════════════════════════════════════════
   타이핑 애니메이션
   ══════════════════════════════════════════════════════════ */
function 타이핑(el, text, speed = 22) {
  return new Promise(resolve => {
    el.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';
    let i = 0;
    const tick = () => {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i++]), cursor);
        setTimeout(tick, speed);
      } else {
        cursor.remove();
        resolve();
      }
    };
    el.appendChild(cursor);
    tick();
  });
}

/* ══════════════════════════════════════════════════════════
   씬 렌더링
   ══════════════════════════════════════════════════════════ */
async function 씬렌더링(씬ID) {

  // 엔딩 / 게임오버 라우팅
  if (씬ID.startsWith('ENDING')) { 엔딩표시(씬ID); return; }
  if (씬ID === 'GAMEOVER')       { 게임오버표시(); return; }

  const 씬 = SCENE_DATA[씬ID];
  if (!씬) return;

  // 화면 전환
  document.getElementById('game-body').style.display    = 'flex';
  document.getElementById('ending-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';

  // 씬 포인트 컬러 적용
  씬_포인트_적용(씬ID);

  // SVG 비주얼
  document.getElementById('svg-mount').innerHTML = SVG[씬ID] || '';
  document.getElementById('visual-label').textContent = 씬.label;

  // 헤더
  document.getElementById('scene-phase-tag').textContent = 씬.phase;
  document.getElementById('scene-title-text').textContent = 씬.title;

  // 스크립트 영역 초기화
  const scriptBody = document.getElementById('script-body');
  scriptBody.innerHTML = '';

  // 배경 묘사 (Glassmorphism 박스)
  const bgEl = document.createElement('div');
  bgEl.className = 'bg-description anim-enter';
  scriptBody.appendChild(bgEl);
  await 타이핑(bgEl, 씬.bgDesc, 18);

  // 광기 환각 메시지 (광기 ≥ 20)
  if (광기 >= 20) {
    const hEl = document.createElement('div');
    hEl.className = 'hallucination-msg anim-enter';
    hEl.textContent = '【광기】 환각이 시야를 흐린다. 현실과 환상의 경계가 무너지고 있다...';
    scriptBody.appendChild(hEl);
  }

  // 대사 (S3은 동적)
  const 대사목록 = 씬ID === 'S3'
    ? [
        { who: '실패한 실험체들', line: '나를 여기서 꺼내줘... 나도 네 핏줄이야...' },
        { who: '바리', line: '나도 당신들과 다를 바 없는 실패작이지. 하지만 나는 살아서 이 저택을 심판할 것이다.' },
        { who: '첫째 언니의 망령', line: 연대 ? '(랜턴이 반짝인다) 이쪽이야... 우회로가 있어.' : '(망령이 천천히 수면 아래로 가라앉는다)' }
      ]
    : (씬.dialogues || []);

  for (const d of 대사목록) {
    const block = document.createElement('div');
    block.className = 'dialogue anim-enter';
    const who  = document.createElement('div');
    who.className = 'dialogue-who';
    who.textContent = d.who;
    const line = document.createElement('div');
    line.className = 'dialogue-line';
    block.appendChild(who);
    block.appendChild(line);
    scriptBody.appendChild(block);
    await 타이핑(line, d.line, 20);
  }

  // S6 수치 힌트
  if (씬ID === 'S6') {
    const hint = document.createElement('div');
    hint.className = 'stat-hint anim-enter';
    hint.innerHTML = `누적 수치 — 의지 <span class="accent">${의지}</span> / 온기 <span class="accent">${온기}</span><br>
      판정: <span class="accent">${의지 > 온기 ? '의지 우위 → 엔딩 B 강화' : 온기 > 의지 ? '온기 우위 → 엔딩 A 강화' : '균형 → 엔딩 C 강화'}</span>`;
    scriptBody.appendChild(hint);
  }

  // 선택지 렌더링
  const list = document.getElementById('choices-list');
  list.innerHTML = '';

  // S6 동적 선택지
  const 선택지목록 = 씬ID === 'S6'
    ? [
        { text: '[영주가 피눈물로 사죄한다] — 주사기를 꽂는다',    effect: '→ 엔딩 A (위선적 용서 / 고통스런 융합)',   action() { 씬이동('ENDING_A'); } },
        { text: '[영주가 핏줄 의무를 강요한다] — 주사기를 부순다', effect: '→ 엔딩 B ★진엔딩 (피의 단절 / 슬픈 방관)',  action() { 씬이동('ENDING_B'); } },
        { text: '[영주가 침묵한다] — 말없이 주사한다',             effect: '→ 엔딩 C (모멸적 시혜 / 맹목적 구원)',      action() { 씬이동('ENDING_C'); } }
      ]
    : 씬.choices;

  선택지목록.forEach((ch, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';

    // 잠금 여부 확인
    const isLocked = ch.locked && ch.locked();
    if (isLocked) btn.classList.add('locked');

    // 잠금 메시지 처리 (함수형 or 문자열)
    const lockedText = typeof ch.lockedMsg === 'function' ? ch.lockedMsg() : (ch.lockedMsg || '');
    const effectText = isLocked && lockedText ? lockedText : ch.effect;

    btn.innerHTML = `
      <span class="choice-num">${idx + 1}</span>
      <span class="choice-text">
        <span>${ch.text}</span>
        <span class="choice-effect ${isLocked ? 'locked-msg' : ''}">${effectText}</span>
      </span>`;

    if (!isLocked) {
      btn.onclick = () => {
        // 모든 버튼 비활성화 (중복 클릭 방지)
        list.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
        ch.action();
      };
    } else {
      btn.disabled = true;
    }

    list.appendChild(btn);
  });

  // 스크롤 초기화
  document.getElementById('script-scroll').scrollTop = 0;
}

/* ══════════════════════════════════════════════════════════
   씬 이동 (페이드 전환)
   ══════════════════════════════════════════════════════════ */
function 씬이동(씬ID) {
  const veil = document.getElementById('transition-veil');
  veil.classList.add('active');
  setTimeout(() => {
    현재씬 = 씬ID;

    // KEY=FALSE → S6 진입 시 게임오버
    if (씬ID === 'S6' && !KEY) { 씬렌더링('GAMEOVER'); }
    else                       { 씬렌더링(씬ID); }

    HUD업데이트();
    veil.classList.remove('active');
  }, 350);
}

/* ══════════════════════════════════════════════════════════
   엔딩 표시
   ══════════════════════════════════════════════════════════ */
function 엔딩표시(endingID) {
  document.getElementById('game-body').style.display        = 'none';
  document.getElementById('gameover-screen').style.display  = 'none';
  const screen = document.getElementById('ending-screen');
  screen.style.display = 'flex';

  // S7 최종 판정: 누적 수치로 엔딩 서술 강화 결정
  // (이미 S6에서 선택지로 분기됨, S7은 수치가 서술에 영향)
  const 판정 = 의지 > 온기 ? '의지 우위' : 온기 > 의지 ? '온기 우위' : '균형';

  const e = ENDING_DATA[endingID];
  document.getElementById('ending-badge').textContent        = e.badge;
  document.getElementById('ending-main-title').textContent   = e.title;
  document.getElementById('ending-subtitle-text').textContent = e.subtitle;
  document.getElementById('ending-body').textContent         = e.story;
  document.getElementById('ending-body').setAttribute('data-label', `${e.label} / S7 판정: ${판정}`);
  document.getElementById('ending-stats').textContent        = `최종 수치 — 의지: ${의지} / 온기: ${온기} / 광기: ${광기}`;

  // 엔딩 화면에서도 SVG 패널 유지
  document.getElementById('svg-mount').innerHTML = SVG[endingID] || '';
}

/* ══════════════════════════════════════════════════════════
   게임 오버 표시
   ══════════════════════════════════════════════════════════ */
function 게임오버표시() {
  document.getElementById('game-body').style.display        = 'none';
  document.getElementById('ending-screen').style.display    = 'none';
  document.getElementById('gameover-screen').style.display  = 'flex';
  document.getElementById('gameover-desc').textContent      =
    `KEY(기원의 혈청) 없이 영주의 침실에 들어설 수 없다.\n\n바리는 저택의 다음 실험체가 되었다.\n\n처음으로 돌아가 다른 선택을 해라.\n\n최종 수치 — 의지: ${의지} / 온기: ${온기} / 광기: ${광기}`;
}

/* ══════════════════════════════════════════════════════════
   파티클 생성
   ══════════════════════════════════════════════════════════ */
function 파티클생성() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'fog-particle';
    const size = 30 + Math.random() * 80;
    p.style.cssText = `
      left: ${Math.random()*100}%;
      width: ${size}px; height: ${size}px;
      animation-duration: ${8 + Math.random()*14}s;
      animation-delay: ${Math.random()*12}s;
      --dx: ${(Math.random()*120-60)}px;
      opacity: ${0.3 + Math.random()*0.4};
    `;
    container.appendChild(p);
  }
}

/* ══════════════════════════════════════════════════════════
   게임 시작 / 재시작
   ══════════════════════════════════════════════════════════ */
function startGame() {
  const veil = document.getElementById('transition-veil');
  veil.classList.add('active');
  setTimeout(() => {
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('hud').style.display          = 'flex';
    document.getElementById('game-body').style.display    = 'flex';
    씬렌더링('S1');
    HUD업데이트();
    veil.classList.remove('active');
  }, 350);
}

function restartGame() {
  // 상태 초기화
  의지 = 0; 온기 = 0; 광기 = 0;
  연대 = false; KEY = false;
  현재씬 = 'S1';

  const veil = document.getElementById('transition-veil');
  veil.classList.add('active');
  setTimeout(() => {
    document.getElementById('ending-screen').style.display    = 'none';
    document.getElementById('gameover-screen').style.display  = 'none';
    document.getElementById('game-body').style.display        = 'flex';

    // 추가된 힌트 박스 제거
    const hints = document.querySelectorAll('.stat-hint');
    hints.forEach(h => h.remove());

    씬렌더링('S1');
    HUD업데이트();
    veil.classList.remove('active');
  }, 350);
}

/* ── 초기화 ── */
파티클생성();
</script>
